<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>IronHike Sim Scenarios</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .scenarios { display: grid; gap: 10px; margin-top: 18px; }
    .scenario {
      display: block;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      color: var(--ink);
      text-decoration: none;
    }
    .scenario:active { background: var(--panel-2); }
    .scenario .name { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
    .scenario .meta { color: var(--ink-dim); font-size: 12px; margin-top: 4px; }
    .scenario .what { color: var(--ink-dim); font-size: 13px; margin-top: 6px; }
    .back { display: inline-block; margin-top: 16px; color: var(--ink-dim); }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Simulation Scenarios</h1>
      <p id="subtitle">Tap a scenario to load the dashboard with pre-baked QA data</p>
    </header>

    <div class="scenarios" id="scenarios">loading…</div>

    <a class="back" href="../">&larr; back to live dashboard</a>
    <p class="back" style="font-size: 11px; opacity: 0.6;">
      Tip: append <code>&amp;simNow=2026-06-06T03:00:00-04:00</code> to any URL to time-travel.
    </p>
  </main>
  <script>
    const DESC = {
      "ontrack":       { what: "On-pace climber. Projection lands right at cutoff. Active." },
      "behind":        { what: "Slow climber, lots of rest. Projection way over cutoff. Active." },
      "ahead":         { what: "Crushing it. ~9h buffer ahead of cutoff. Active." },
      "resting":       { what: "Last lap 2h 45m ago. Status flips to RESTING." },
      "finished":      { what: "All 49 laps done with ~1.4h to spare. Victory state." },
      "cutoff-passed": { what: "Cutoff already 60 min ago, 46/49 done. DNF." },
      "duplicate":     { what: "Accidental double-tap inside the log. Tests the duplicate warning." },
    };
    const ORDER = ["ontrack", "ahead", "behind", "resting", "finished", "cutoff-passed", "duplicate"];

    fetch("./manifest.json?cb=" + Date.now())
      .then(r => r.json())
      .then(m => {
        const el = document.getElementById("scenarios");
        el.innerHTML = "";
        for (const name of ORDER) {
          if (!m[name]) continue;
          const info = m[name];
          const a = document.createElement("a");
          a.className = "scenario";
          a.href = `../?sim=${name}`;
          const when = new Date(info.sim_now_iso).toLocaleString([], {
            weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit",
          });
          a.innerHTML = `
            <div class="name">${name}</div>
            <div class="meta">${info.laps_done} laps · sim time: ${when}</div>
            <div class="what">${(DESC[name] || {}).what || ""}</div>
          `;
          el.appendChild(a);
        }
      })
      .catch(e => {
        document.getElementById("scenarios").textContent = "Failed to load manifest.json — run sim/generate.py";
        console.error(e);
      });
  </script>
</body>
</html>
